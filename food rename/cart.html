<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - FoodHub</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">FoodHub</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="menu.html" class="nav-link">Menu</a>
                    <a href="cart.html" class="nav-link active cart-link">
                        Cart
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                </nav>
                <div class="auth-buttons" id="authButtons">
                    <a href="login.html" class="btn btn-outline">Login</a>
                    <a href="register.html" class="btn btn-primary">Sign Up</a>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Cart Section -->
    <section class="page-content">
        <div class="container">
            <h1 class="page-title">Shopping Cart</h1>
            
            <div class="cart-layout">
                <!-- Cart Items -->
                <div class="cart-items">
                    <div id="cartItemsList">
                        <!-- Cart items will be loaded here by JavaScript -->
                    </div>
                    <div id="emptyCart" style="display: none;">
                        <div class="empty-state">
                            <h3>Your cart is empty</h3>
                            <p>Add some delicious items from our menu!</p>
                            <a href="menu.html" class="btn btn-primary">Browse Menu</a>
                        </div>
                    </div>
                </div>

                <!-- Cart Summary -->
                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (10%)</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span id="delivery">$5.00</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button class="btn btn-primary btn-block" id="checkoutBtn">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 FoodHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/cart.js"></script>
    <script src="scripts/cart-page.js"></script>
</body>
</html>
