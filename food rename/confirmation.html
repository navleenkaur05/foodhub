<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - FoodHub</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">FoodHub</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="menu.html" class="nav-link">Menu</a>
                    <a href="cart.html" class="nav-link cart-link">
                        Cart
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                </nav>
                <div class="auth-buttons" id="authButtons">
                    <a href="login.html" class="btn btn-outline">Login</a>
                    <a href="register.html" class="btn btn-primary">Sign Up</a>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Confirmation Section -->
    <section class="confirmation-section">
        <div class="container">
            <div class="confirmation-card">
                <div class="success-icon">✓</div>
                <h1>Order Confirmed!</h1>
                <p class="confirmation-subtitle">Thank you for your order</p>
                <div class="order-details">
                    <p>Your order number is: <strong id="orderNumber"></strong></p>
                    <p>Estimated delivery time: <strong>30-45 minutes</strong></p>
                </div>
                <div class="confirmation-actions">
                    <a href="menu.html" class="btn btn-primary">Order Again</a>
                    <a href="index.html" class="btn btn-outline">Go to Home</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 FoodHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/cart.js"></script>
    <script src="scripts/confirmation.js"></script>
</body>
</html>
