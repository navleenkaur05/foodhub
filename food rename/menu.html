<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - FoodHub</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <a href="index.html" class="logo">FoodHub</a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="menu.html" class="nav-link active">Menu</a>
                    <a href="cart.html" class="nav-link cart-link">
                        Cart
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                </nav>
                <div class="auth-buttons" id="authButtons">
                    <a href="login.html" class="btn btn-outline">Login</a>
                    <a href="register.html" class="btn btn-primary">Sign Up</a>
                </div>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-outline" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Menu Section -->
    <section class="page-content">
        <div class="container">
            <h1 class="page-title">Our Menu</h1>
            
            <!-- Category Filter -->
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="Mains">Mains</button>
                <button class="filter-btn" data-category="Salads">Salads</button>
                <button class="filter-btn" data-category="Desserts">Desserts</button>
                <button class="filter-btn" data-category="Drinks">Drinks</button>
            </div>

            <!-- Menu Items Grid -->
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 FoodHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/cart.js"></script>
    <script src="scripts/menu.js"></script>
</body>
</html>
